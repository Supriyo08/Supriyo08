<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="150" viewBox="0 0 1200 150" role="img" aria-label="exit — connection closed">
<title>exit — terminal footer</title>
<defs>
  <linearGradient id="bgf" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0d1117"/>
    <stop offset="1" stop-color="#0a0f14"/>
  </linearGradient>
  <pattern id="scanf" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="#00ff41" opacity="0.045"/>
  </pattern>
  <filter id="glowf" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <clipPath id="cardf"><rect x="1" y="1" width="1198" height="148" rx="10"/></clipPath>
</defs>
<style>
  text{font-family:'Consolas','Menlo','DejaVu Sans Mono','Courier New',monospace;}
  .titlef{fill:#00ff41;font-size:40px;font-weight:700;}
  .promptf{fill:#2ea043;font-size:14px;}
  .dimf{fill:#8b949e;font-size:14px;}
  .codef{fill:#00ff41;font-size:13px;opacity:0.35;}
  .cursorf{fill:#00ff41;animation:blinkf 1.1s steps(1) infinite;}
  @keyframes blinkf{0%,55%{opacity:1;}56%,100%{opacity:0;}}
</style>

<rect x="0.5" y="0.5" width="1199" height="149" rx="10" fill="url(#bgf)" stroke="#21262d"/>
<g clip-path="url(#cardf)">
  <polygon points="0,0 1200,0 1200,110" fill="#11161d" opacity="0.5"/>

  <text x="70" y="46" class="promptf" xml:space="preserve">└─$ exit</text>
  <text x="70" y="94" class="titlef" textLength="200" lengthAdjust="spacingAndGlyphs" filter="url(#glowf)" xml:space="preserve">&gt;_ exit</text>
  <rect x="284" y="62" width="18" height="38" class="cursorf"/>

  <text x="70" y="128" class="dimf">connection closed — thanks for stopping by</text>
  <text x="1150" y="128" text-anchor="end" class="codef">[ session terminated · exit code 0 ]</text>

  <rect x="1" y="1" width="1198" height="148" fill="url(#scanf)"/>
</g>
</svg>
