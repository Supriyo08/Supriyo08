<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="300" viewBox="0 0 1200 300" role="img" aria-label="supriyo.exe — connection established, access granted">
<title>supriyo.exe — terminal banner</title>
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
    <stop offset="0" stop-color="#0d1117"/>
    <stop offset="1" stop-color="#0a0f14"/>
  </linearGradient>
  <pattern id="scan" width="4" height="4" patternUnits="userSpaceOnUse">
    <rect width="4" height="1" fill="#00ff41" opacity="0.045"/>
  </pattern>
  <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
    <feGaussianBlur stdDeviation="7" result="b"/>
    <feMerge>
      <feMergeNode in="b"/>
      <feMergeNode in="SourceGraphic"/>
    </feMerge>
  </filter>
  <linearGradient id="sweepg" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0" stop-color="#00ff41" stop-opacity="0"/>
    <stop offset="0.5" stop-color="#00ff41" stop-opacity="0.07"/>
    <stop offset="1" stop-color="#00ff41" stop-opacity="0"/>
  </linearGradient>
  <clipPath id="card"><rect x="1" y="1" width="1198" height="298" rx="10"/></clipPath>
</defs>
<style>
  text{font-family:'Consolas','Menlo','DejaVu Sans Mono','Courier New',monospace;}
  .title{fill:#00ff41;font-size:76px;font-weight:700;}
  .prompt{fill:#2ea043;font-size:15px;}
  .chrome{fill:#8b949e;font-size:13px;}
  .ok{fill:#3fb950;font-size:14px;}
  .okt{fill:#7ee787;font-size:14px;}
  .hex{fill:#00ff41;font-size:13px;opacity:0.16;}
  .cursor{fill:#00ff41;animation:blink 1.1s steps(1) infinite;}
  .s1{animation:fadein .5s ease .35s both;}
  .s2{animation:fadein .5s ease .85s both;}
  .s3{animation:fadein .5s ease 1.35s both;}
  @keyframes blink{0%,55%{opacity:1;}56%,100%{opacity:0;}}
  @keyframes fadein{from{opacity:0;}to{opacity:1;}}
</style>

<!-- card -->
<rect x="0.5" y="0.5" width="1199" height="299" rx="10" fill="url(#bg)" stroke="#21262d"/>
<g clip-path="url(#card)">
  <polygon points="0,44 1200,44 1200,224" fill="#11161d" opacity="0.55"/>

  <!-- window chrome -->
  <path d="M1 11 a10 10 0 0 1 10 -10 h1178 a10 10 0 0 1 10 10 v33 h-1198 z" fill="#161b22"/>
  <line x1="1" y1="44" x2="1199" y2="44" stroke="#21262d"/>
  <circle cx="26" cy="22" r="7" fill="#ff5f56"/>
  <circle cx="50" cy="22" r="7" fill="#ffbd2e"/>
  <circle cx="74" cy="22" r="7" fill="#27c93f"/>
  <text x="600" y="27" text-anchor="middle" class="chrome">supriyo@earth: ~ — zsh</text>

  <!-- shell prompt -->
  <text x="70" y="88" class="prompt" xml:space="preserve">┌──(supriyo@earth)-[~]</text>
  <text x="70" y="110" class="prompt" xml:space="preserve">└─$ ./supriyo.exe --init</text>

  <!-- hex easter egg: S U P R I Y O -->
  <text x="1150" y="88" text-anchor="end" class="hex">01101000 01101001</text>
  <text x="1150" y="108" text-anchor="end" class="hex">0x53 0x55 0x50 0x52 0x49 0x59 0x4F</text>

  <!-- title -->
  <text x="70" y="192" class="title" textLength="640" lengthAdjust="spacingAndGlyphs" filter="url(#glow)" xml:space="preserve">&gt;_ supriyo.exe</text>
  <rect x="728" y="134" width="30" height="66" class="cursor"/>

  <!-- boot log -->
  <g class="s1">
    <text x="70" y="244" class="ok">[ OK ]</text>
    <text x="128" y="244" class="okt">connection established</text>
  </g>
  <g class="s2">
    <text x="356" y="244" class="ok">[ OK ]</text>
    <text x="414" y="244" class="okt">access granted</text>
  </g>
  <g class="s3">
    <text x="576" y="244" class="ok">[ OK ]</text>
    <text x="634" y="244" class="okt">welcome, visitor</text>
  </g>

  <!-- CRT overlay + slow scan sweep -->
  <rect x="1" y="44" width="1198" height="255" fill="url(#scan)"/>
  <rect x="1" y="-120" width="1198" height="110" fill="url(#sweepg)">
    <animateTransform attributeName="transform" type="translate" from="0 0" to="0 540" dur="7s" repeatCount="indefinite"/>
  </rect>
</g>
</svg>
